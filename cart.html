
<!DOCTYPE >
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 40px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }
        h1 {
            text-align: center;
            color: #e04a3a;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #f26522;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }
        .total {
            text-align: right;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 20px;
            color: #333;
            padding-right: 10px;
        }
        .checkout-container {
            text-align: center;
            margin-top: 30px;
        }
        .checkout {
            display: inline-block;
            background-color: #2e7d32;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1.1rem;
            transition: background-color 0.2s;
        }
        .checkout:hover {
            background-color: #1b5e20;
        }
        .btn-remove {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-remove:hover {
            background-color: #b71c1c;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 1.1rem;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #f26522;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="foodmenu.html" class="back-btn">← Back to Menu</a>
        <h1>Your Cart</h1>

        <table>
            <thead>
                <tr>
                    <th style="width: 50%;">Food Item</th>
                    <th style="width: 25%;">Price</th>
                    <th style="width: 25%; text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody id="cart-table-body">
                <!-- Row items build dynamically here via JS -->
            </tbody>
        </table>

        <div class="total" id="totalPrice">Total: ₹0</div>

        <div class="checkout-container">
            <a href="checkout.html" class="checkout">Proceed to Checkout</a>
        </div>
    </div>

    <script>
        // STEP 1: Main window load setup
        window.onload = function() {
            renderCart();
        };

        // STEP 2: Main Render Function
        function renderCart() {
            const tableBody = document.getElementById('cart-table-body');
            const totalPriceElement = document.getElementById('totalPrice');
            
            // Consistently using localStorage to keep products safely stored across tabs
			let cart = JSON.parse(localStorage.getItem('mockCart')) || [];
			            
			            if (cart.length === 0) {
			                if (tableBody) {
			                    tableBody.innerHTML = "<tr><td colspan='3' class='empty-message'>Your cart is empty</td></tr>";
			                }
			                if (totalPriceElement) {
			                    totalPriceElement.innerHTML = "Total: ₹0";
			                }
			                return;
			            }
			            
			            let rowsHtml = "";
			            let totalBill = 0;
			            
			            // Loop through each item in your array cleanly
			            cart.forEach((item, index) => {
			                let price = Number(item.price) || 0;
			                totalBill += price;
			                
			                rowsHtml += "<tr>";
			                rowsHtml += "<td style='padding: 10px; border-bottom: 1px solid #ddd;'>" + item.name + "</td>";
			                rowsHtml += "<td style='padding: 10px; border-bottom: 1px solid #ddd;'>₹" + price + "</td>";
			                rowsHtml += "<td style='text-align: center;'><button class='btn-remove' onclick='removeItem(" + index + ")'>❌ Remove</button></td>";
			                rowsHtml += "</tr>";
			            });
			            
			            if (tableBody) {
			                tableBody.innerHTML = rowsHtml;
			            }
			            if (totalPriceElement) {
			                totalPriceElement.innerHTML = "Total: ₹" + totalBill;
			            }
			        } // <--- FIXED: Added this closing brace on line 131 to close renderCart()!

			        // STEP 3: Remove Item Action Function (Now properly defined in Global Scope!)
			        function removeItem(targetIndex) {
			            let cart = JSON.parse(localStorage.getItem('mockCart')) || [];
			            
			            // Slices out exactly 1 element corresponding to the clicked button index
			            cart.splice(targetIndex, 1);
			            
			            // Update the persistent localStorage copy
			            localStorage.setItem('mockCart', JSON.stringify(cart));
			            
			            // Instantly refresh the visual representation on screen
			            renderCart();
			        }
			    </script>

			</body>
			</html>
