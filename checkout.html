
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Payment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .checkout-card {
            background-color: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: left;
            box-sizing: border-box;
        }

        h2 {
            color: #d35400;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.6rem;
            font-weight: bold;
        }

        /* Matches the beige summary container from your photo */
        .summary-container {
            background-color: #fdf2ee;
            border: 1px solid #f9ebe6;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            color: #555;
            font-size: 1rem;
        }

        .divider {
            border-top: 1px solid #f5dcd3;
            margin: 10px 0;
        }

        .amount-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e04a3a;
            font-weight: bold;
            font-size: 1.25rem;
            margin-top: 5px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: #fafafa;
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 25px;
            cursor: pointer;
            box-sizing: border-box;
        }

        select:focus {
            outline: none;
            border-color: #f26522;
        }

        /* Matches the green payment button from your photo */
        .btn-pay {
            background-color: #588c73;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-pay:hover {
            background-color: #406854;
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .btn-back:hover {
            color: #d35400;
        }
    </style>
</head>
<body>

    <div class="checkout-card">
        <h2>Checkout Payment</h2>

        <div class="summary-container">
            <div class="summary-row">
                <span>Customer Name:</span>
                <span id="custName" style="font-weight: bold; color: #333;">Walk-in Guest</span>
            </div>
            <div class="summary-row">
                <span>Total Food Items:</span>
                <span id="totalItems" style="font-weight: bold; color: #333;">0</span>
            </div>
            <div class="divider"></div>
            <div class="amount-row">
                <span>Amount to Pay:</span>
                <span id="amountToPay">₹0</span>
            </div>
        </div>
		<form id="paymentForm" onsubmit="processPayment(event)">
		            <label for="paymentMethod">Select Payment Method</label>
		            <select id="paymentMethod" required>
		                <option value="UPI (Paytm/GPay/PhonePe)">UPI (Paytm/GPay/PhonePe)</option>
		                <option value="Cash on Delivery (COD)">Cash on Delivery (COD)</option>
		                <option value="Debit/Credit Card">Debit/Credit Card</option>
		                <option value="Net Banking">Net Banking</option>
		            </select>

		            <button type="submit" class="btn-pay">Pay & Generate Invoice</button>
		        </form>

		        <a href="cart.html" class="btn-back">← Back to Cart</a>
		    </div>

		    <script>
		        window.onload = function() {
		            loadPaymentDetails();
		        };

		        function loadPaymentDetails() {
		            const nameElement = document.getElementById('custName');
		            const itemsElement = document.getElementById('totalItems');
		            const priceElement = document.getElementById('amountToPay');

		            // 1. Fetch logged-in user name from sessionStorage (falls back to Walk-in Guest)
		            const userName = sessionStorage.getItem('loggedInUser') || "Walk-in Guest";
		            if (nameElement) nameElement.innerText = userName;

		            // 2. Read cart data using matching localStorage key
		            let cart = JSON.parse(localStorage.getItem('mockCart')) || [];
		            
		            // If the cart is empty, alert and send them back to menu
		            if (cart.length === 0) {
		                alert("Your cart is empty! Add some food items first.");
		                window.location.href = "foodmenu.html";
		                return;
		            }

		            // Calculate totals
		            let totalBill = 0;
		            cart.forEach(item => {
		                totalBill += Number(item.price) || 0;
		            });

		            // Update UI elements with correct data
		            if (itemsElement) itemsElement.innerText = cart.length;
		            if (priceElement) priceElement.innerText = "₹" + totalBill;
		        }

		        function processPayment(event) {
		            event.preventDefault(); // Stop standard browser form submit reload

		            let cart = JSON.parse(localStorage.getItem('mockCart')) || [];
		            if(cart.length === 0) return;

		            const selectedPayment = document.getElementById('paymentMethod').value;
		            const userName = sessionStorage.getItem('loggedInUser') || "Walk-in Guest";
		            let totalBill = cart.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
		            
		            // Generate a random unique Order ID
		            const orderId = "ORD-" + Math.floor(100000 + Math.random() * 900000);

		            let orderDetails = {
		                orderId: orderId,
		                name: userName,
		                payment: selectedPayment,
		                items: cart,
		                total: totalBill,
		                date: new Date().toLocaleString()
		            };

		            // Save order data for invoice page, and clear the active cart
		            localStorage.setItem('latestOrder', JSON.stringify(orderDetails));
		            localStorage.removeItem('mockCart'); // Empty cart since checkout is complete

		            // Redirect smoothly to the invoice receipt page
		            window.location.href = "invoice.html";
		        }
		    </script>

		</body>
		</html>
