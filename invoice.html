
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>title</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .invoice-card {
            background-color: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #d35400;
            margin: 0;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .header p {
            color: #777;
            margin: 5px 0 0 0;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Order Metadata details matching your screenshot */
        .meta-container {
            display: grid;
            grid-template-columns: auto 1fr;
            row-gap: 10px;
            column-gap: 20px;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .meta-label {
            font-weight: bold;
            color: #666;
        }

        .meta-value {
            color: #333;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        /* Matches the green/grey themed table from your photo */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background-color: #588c73;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 0.95rem;
            border: 1px solid #588c73;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            color: #444;
            font-size: 0.95rem;
        }

        .empty-message {
            text-align: center;
            color: #777;
            padding: 30px;
            background-color: #fafafa;
        }

        /* Grand Total box matching your screenshot layout */
        .total-box {
            display: flex;
            justify-content: flex-end;
            background-color: #f6ebe6;
            padding: 15px 25px;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            border: 1px solid #f2ded6;
        }

        .total-label {
            margin-right: 40px;
            color: #555;
        }

        .total-value {
            color: #d35400;
        }

        /* Matches the green payment button from your photo */
        .btn-print {
            background-color: #588c73;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-align: center;
            display: block;
            text-decoration: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn-print:hover {
            background-color: #406854;
        }

        .btn-menu {
            display: block;
            text-align: center;
            color: #d35400;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
        }
		.btn-menu:hover {
		            text-decoration: underline;
		        }

		        @media print {
		            body {
		                background-color: white;
		                padding: 0;
		            }
		            .invoice-card {
		                box-shadow: none;
		                padding: 0;
		                max-width: 100%;
		            }
		            .btn-print, .btn-menu {
		                display: none;
		            }
		        }
		    </style>
		</head>
		<body>

		    <div class="invoice-card">
		        <div class="header">
		            <h1>Food Ordering System</h1>
		            <p>Order Invoice</p>
		        </div>

		        <!-- Meta Details Section -->
		        <div class="meta-container">
		            <div class="meta-label">Order ID:</div>
		            <div class="meta-value" id="inv-order-id">ORD-000000</div>

		            <div class="meta-label">Customer Name:</div>
		            <div class="meta-value" id="inv-customer-name">Walk-in Guest</div>

		            <div class="meta-label">Phone Number:</div>
		            <div class="meta-value" id="inv-phone">No Contact Saved</div>

		            <div class="meta-label">Payment Method:</div>
		            <div class="meta-value" id="inv-payment">UPI (Paytm/GPay)</div>
		        </div>

		        <div class="section-title">Order Summary</div>

		        <table>
		            <thead>
		                <tr>
		                    <th style="width: 40%;">Food Item</th>
		                    <th style="width: 20%; text-align: right;">Price</th>
		                    <th style="width: 20%; text-align: center;">Quantity</th>
		                    <th style="width: 20%; text-align: right;">Total</th>
		                </tr>
		            </thead>
		            <tbody id="invoice-items-body">
		                <!-- Row items build dynamically here -->
		            </tbody>
		        </table>

		        <!-- Grand Total box -->
		        <div class="total-box">
		            <span class="total-label">Grand Total:</span>
		            <span class="total-value" id="inv-grand-total">₹0</span>
		        </div>

		        <!-- Action buttons -->
		        <button onclick="window.print()" class="btn-print">Print Receipt</button>
		        <a href="foodmenu.html" class="btn-menu">← Order More Food</a>
		    </div>

		    <script>
		        window.onload = function() {
		            renderInvoice();
		        };

		        function renderInvoice() {
		            const itemsBody = document.getElementById('invoice-items-body');
		            const grandTotalElement = document.getElementById('inv-grand-total');
		            
		            // 1. Safe read: Load the complete order details from completed checkout
		            let order = JSON.parse(localStorage.getItem('latestOrder'));
		            
		            if (!order) {
		                if (itemsBody) {
		                    itemsBody.innerHTML = "<tr><td colspan='4' class='empty-message'>No recent order found.</td></tr>";
		                }
		                return;
		            }

		            // 2. Populate Header metadata
		            document.getElementById('inv-order-id').innerText = order.orderId || "N/A";
		            document.getElementById('inv-customer-name').innerText = order.name || "Walk-in Guest";
		            document.getElementById('inv-phone').innerText = order.phone || "No Contact Saved";
		            document.getElementById('inv-payment').innerText = order.payment || "N/A";

		            // 3. Process items to calculate counts (aggregating identical items for quantity)
		            let rawItems = order.items || [];
		            
		            if (rawItems.length === 0) {
		                if (itemsBody) {
		                    itemsBody.innerHTML = "<tr><td colspan='4' class='empty-message'>Your cart list is empty.</td></tr>";
		                }
		                grandTotalElement.innerText = "₹0";
		                return;
		            }

		            // Grouping identical items to count Quantity
					let groupedItems = {};
					            rawItems.forEach(item => {
					                if (groupedItems[item.name]) {
					                    groupedItems[item.name].quantity += 1;
					                } else {
					                    groupedItems[item.name] = {
					                        price: Number(item.price) || 0,
					                        quantity: 1
					                    };
					                }
					            });

					            // 4. Generate visual item rows
					            let rowsHtml = "";
					            let computedGrandTotal = 0;

					            for (let itemName in groupedItems) {
					                let details = groupedItems[itemName];
					                let itemTotal = details.price * details.quantity;
					                computedGrandTotal += itemTotal;

					                rowsHtml += "<tr>";
					                rowsHtml += "<td>" + itemName + "</td>";
					                rowsHtml += "<td style='text-align: right;'>₹" + details.price + "</td>";
					                rowsHtml += "<td style='text-align: center; font-weight: bold;'>" + details.quantity + "</td>";
					                rowsHtml += "<td style='text-align: right; font-weight: bold;'>₹" + itemTotal + "</td>";
					                rowsHtml += "</tr>";
					            }

					            // Write items list and total
					            if (itemsBody) {
					                itemsBody.innerHTML = rowsHtml;
					            }
					            if (grandTotalElement) {
					                grandTotalElement.innerText = "₹" + (order.total || computedGrandTotal);
					            }
					        }
					    </script>

					</body>
					</html>
